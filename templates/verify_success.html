{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div
        class="w-full max-w-md bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden text-center">
        <div class="bg-green-600 p-12 text-white">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white/20 rounded-full mb-6">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-bold mb-2">Email Verified!</h2>
            <p class="text-green-100 opacity-90">Your account is now fully active.</p>
        </div>

        <div class="p-12 space-y-6">
            <p class="text-slate-600 text-lg">
                Thank you for verifying your email address. You can now access the Mini Bug Tracker.
            </p>

            <a href="{{ url_for('main.login') }}"
                class="inline-block w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-green-200 hover:scale-[1.02] active:scale-[0.98]">
                Jump to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
