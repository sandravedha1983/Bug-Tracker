{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white p-8 border border-slate-200 rounded-2xl shadow-sm">
        <h2 class="text-2xl font-bold text-slate-900 mb-2">Resend Verification</h2>
        <p class="text-slate-500 mb-6">Enter your email address to receive a new verification link.</p>

        <form action="{{ url_for('main.resend_verification_request') }}" method="POST">
            <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors">
                Send Verification Link
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-600">
            <a href="{{ url_for('main.login') }}" class="text-blue-600 hover:underline">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
