{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div
        class="w-full max-w-md bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
        <div class="bg-indigo-600 p-8 text-white text-center">
            <h2 class="text-3xl font-bold mb-2">Welcome Back</h2>
            <p class="text-indigo-100 opacity-90">Sign in to manage your bugs</p>
        </div>

        <form method="POST" class="p-8 space-y-6">
            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-700" for="email">Email Address</label>
                <input type="email" name="email" id="email" required placeholder="admin@bugtracker.com"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-700" for="password">Password</label>
                <input type="password" name="password" id="password" required placeholder="••••••••"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
            </div>

            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-indigo-200 hover:scale-[1.02] active:scale-[0.98]">
                Sign In
            </button>

            <p class="text-center text-sm text-slate-500 mt-4">
                Don't have an account? <a href="{{ url_for('main.signup') }}"
                    class="text-indigo-600 font-bold hover:underline">Sign up</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
